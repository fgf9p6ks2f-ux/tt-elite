name: bmbets-soft-odds
# Scrapes bmbets per-book POINTS totals (Czech Liga Pro + TT Elite) — the SOFT-line layer
# that unlocks the line-shopping edge. The odds are reCAPTCHA-v3 gated, so we render each
# match in HEADED Chromium (xvfb) via Playwright rather than a plain request. Match discovery
# is open (curl_cffi). If the datacenter IP gets reCAPTCHA-blocked (0 scraped -> the log says
# so and no commit), add a residential proxy as the BMBETS_PROXY repo secret.
on:
  workflow_dispatch:
    inputs:
      limit:
        description: "matches to scrape"
        default: "25"
  schedule:
    - cron: "*/20 6-23 * * *"     # ~8am-1am Poland — the TT playing day
concurrency:
  group: bmbets-soft-odds
  cancel-in-progress: true
permissions:
  contents: write
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install curl_cffi playwright requests
      - run: python -m playwright install --with-deps chromium
      - run: sudo apt-get install -y xvfb
      - name: scrape bmbets soft totals + flag/push +EV spots
        env:
          BMBETS_PROXY: ${{ secrets.BMBETS_PROXY }}
          BMBETS_HEADED: "1"
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          git config user.name "tt-bot"
          git config user.email "tt-bot@users.noreply.github.com"
          xvfb-run -a python bmbets_odds.py --limit "${{ github.event.inputs.limit || 25 }}" --show || echo "bmbets scrape errored"
          # edge layer: validated H2H lean x the softest bmbets price -> push NEW +EV spots.
          # --push-shadow: user wants all 4 leagues alerted (Czech Liga Pro + TT Cup are shadow/
          # historically -EV, pushed anyway on request; they carry a ⚠ shadow tag in the alert).
          python bmbets_edge.py --push --push-shadow || echo "edge layer skipped"
          if [ -n "$(git status --porcelain bmbets.sqlite bmbets_seen.json)" ]; then
            git add -f bmbets.sqlite 2>/dev/null || true          # each add guarded: bmbets_seen.json
            git add -f bmbets_seen.json 2>/dev/null || true       # only exists once a spot has pushed
            git commit -m "bmbets soft totals + edges [skip ci]" >/dev/null 2>&1 || true
            git pull --rebase --autostash -X theirs -q || true
            git push -q || echo "push skipped"
            echo "committed bmbets rows + seen"
          else
            echo "NO bmbets rows this run — reCAPTCHA likely blocked the datacenter IP; set BMBETS_PROXY secret"
          fi
