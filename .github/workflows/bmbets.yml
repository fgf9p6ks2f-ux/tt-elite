name: bmbets-soft-odds
# SELF-REDISPATCHING LOOP (GitHub throttles/drops the */20 cron -> saw 75-min gaps). Instead:
# one job installs Playwright ONCE (amortized), then LOOPS scrape+edge every ~4 min for ~50 min,
# and an always() step re-dispatches the NEXT run via DISPATCH_PAT -> an immortal chain that never
# waits on the cron. The hourly cron is just a SEED in case the chain ever breaks. Odds are
# reCAPTCHA-v3 gated so we render in headed Chromium (xvfb); set BMBETS_PROXY if a datacenter IP
# ever gets blocked. Add the DISPATCH_PAT secret (a fine-grained PAT with Actions: read+write on
# this repo) to make the loop immortal — without it, it falls back to the hourly cron.
on:
  workflow_dispatch:
    inputs:
      limit:
        description: "matches per scrape iteration"
        default: "30"
  schedule:
    - cron: "9 4-23 * * *"     # hourly seed across the TT playing day (UTC); self-redispatch fills the gaps
    - cron: "9 0-2 * * *"      # late slate
concurrency:
  group: bmbets-soft-odds
  cancel-in-progress: true      # newest start supersedes; a dropped seed is covered by the running loop
permissions:
  contents: write
jobs:
  loop:
    runs-on: ubuntu-latest
    timeout-minutes: 60         # ~50-min loop, then the always() step redispatches the next run
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install curl_cffi playwright requests
      - run: python -m playwright install --with-deps chromium
      - run: sudo apt-get install -y xvfb
      - name: loop scrape + edge (~4-min cadence, ~50 min), push +EV, commit each cycle
        env:
          BMBETS_PROXY: ${{ secrets.BMBETS_PROXY }}
          BMBETS_HEADED: "1"
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          git config user.name "tt-bot"
          git config user.email "tt-bot@users.noreply.github.com"
          LIM="${{ github.event.inputs.limit || 30 }}"
          for i in $(seq 1 6); do
            echo "── cycle $i/6 ──"
            xvfb-run -a python bmbets_odds.py --limit "$LIM" || echo "scrape errored"
            python bmbets_edge.py --push --push-shadow || echo "edge layer skipped"
            if [ -n "$(git status --porcelain bmbets.sqlite bmbets_seen.json)" ]; then
              git add -f bmbets.sqlite 2>/dev/null || true
              git add -f bmbets_seen.json 2>/dev/null || true
              git commit -m "bmbets soft totals + edges [skip ci]" >/dev/null 2>&1 || true
              git pull --rebase --autostash -X theirs -q || true
              git push -q || echo "push skipped"
            fi
            [ "$i" -lt 6 ] && sleep 240 || true
          done
      - name: self-redispatch — keep the loop immortal past throttled crons
        if: always()
        env:
          DISPATCH_PAT: ${{ secrets.DISPATCH_PAT }}
        run: |
          if [ -z "$DISPATCH_PAT" ]; then
            echo "no DISPATCH_PAT secret — relying on the hourly cron (add it for an immortal chain)"; exit 0
          fi
          code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $DISPATCH_PAT" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/bmbets.yml/dispatches" \
            -d '{"ref":"main","inputs":{"limit":"30"}}')
          if [ "$code" = "204" ]; then echo "✓ redispatched next bmbets loop (immortal chain)";
          else echo "redispatch HTTP $code — the hourly cron is the fallback"; fi
