name: tt-elite-daily
# Resilient TT flagger. GitHub throttles/drops per CRON TICK, not per JOB, so instead of
# 4x/day (a dropped run = a multi-hour gap) cron just STARTS one job every 30 min and the
# job LOOPS the pipeline every ~9 min: refresh 24live -> pull SHARP totals (kambi + smarkets
# exchange, the anchor to compare a soft book against) -> rebuild today.md (check_today
# writes alert.txt + reminders.txt, deduped via notified.txt) -> push new bets -> schedule
# 5-min reminders -> grade paper ledger -> commit. cancel-in-progress hands off seamlessly;
# a delayed next-start is covered because the old job keeps polling up to 60 min. Free
# compute, token-free, no BetsAPI secret.
on:
  schedule:
    - cron: "*/30 6-23 * * *"   # ~8am-1am Poland (CEST): the TT playing day
    - cron: "*/30 0-1 * * *"    # tail of the late slate
  workflow_dispatch: {}

concurrency:
  group: tt-elite-daily
  cancel-in-progress: true      # a fresh run supersedes the old -> continuous coverage

permissions:
  contents: write

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 60         # keep polling until the next 30-min run supersedes us
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests curl_cffi
      - name: poll every ~9 min — refresh, flag, push, remind, grade, commit
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          PUBLIC_REPO_PAT: ${{ secrets.PUBLIC_REPO_PAT }}
        run: |
          git config user.name "tt-bot"
          git config user.email "tt-bot@users.noreply.github.com"
          # ntfy now fires ONLY for: new-bet alerts (below), 5-min reminders (below), and
          # the nightly results digest (separate workflow). slate_push benched 2026-07-09.
          for i in $(seq 1 6); do
            python ingest_24live.py --limit 400 || echo "ingest skipped"
            # SHARP anchor snapshot each cycle (~9-min resolution → captures openers + line moves).
            # Keyless; append to tt.sqlite:odds (committed below). Never fail the loop on a feed hiccup.
            python kambi_odds.py || echo "kambi odds skipped"      # populated: Liga Pro + TT Elite
            python smarkets.py  || echo "smarkets odds skipped"    # exchange x-check: all leagues, thin
            {
              echo "# Table tennis — actionable bets (TT Elite · Setka · Liga Pro · TT Cup)"
              echo
              echo "_updated $(date -u +'%Y-%m-%d %H:%M UTC')_"
              echo
              echo "Per-league shrunk-posterior rules (holdout-validated). Fewer, sharper bets."
              echo
              echo '```'
              python check_today.py --line 74.5 2>&1 || echo "(no fixtures right now)"
              echo '```'
            } > today.md
            python paper_ledger.py || echo "paper ledger skipped"
            python tt_board.py || echo "tt board skipped"           # dashboard TT tab feed
            python push_tt_board.py || echo "tt push skipped"       # -> public dashboard repo
            if [ -n "$NTFY_TOPIC" ] && [ -s alert.txt ]; then
              curl -s -H "Title: Table tennis bets" -H "Priority: high" -H "Tags: ping_pong" \
                   -d "$(cat alert.txt)" "https://ntfy.sh/$NTFY_TOPIC" && echo "pushed $(wc -l < alert.txt) alert(s)"
            fi
            if [ -n "$NTFY_TOPIC" ] && [ -s reminders.txt ]; then
              while IFS=$'\t' read -r at msg; do
                [ -n "$at" ] && curl -s -H "Title: TT match starts soon" -H "At: $at" \
                  -H "Priority: high" -H "Tags: alarm_clock" -d "$msg" \
                  "https://ntfy.sh/$NTFY_TOPIC" >/dev/null
              done < reminders.txt
              echo "scheduled $(wc -l < reminders.txt) reminder(s)"
            fi
            if [ -n "$(git status --porcelain)" ]; then
              git add -f tt.sqlite today.md notified.txt paper.md
              if git commit -m "tt update [skip ci]" >/dev/null 2>&1; then
                git pull --rebase --autostash -X theirs -q || true
                git push -q || true
              fi
            fi
            sleep 540
          done
