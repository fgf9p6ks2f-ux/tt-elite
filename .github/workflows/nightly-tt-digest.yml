name: nightly-tt-digest
# ~11:40pm-MT table-tennis results digest: per-league daily record + all-time units
# from the paper ledger. Delay-tolerant: the script targets the completed MT day over a
# wide window and dedupes via the tt_digests.md day header, so late/dropped GitHub crons
# and the extra catch-nets all resolve to exactly one send.
on:
  schedule:
    - cron: "40 5 * * *"     # 23:40 MDT (summer, primary)
    - cron: "40 6 * * *"     # 23:40 MST (winter, primary)
    - cron: "20 7 * * *"     # ~01:20 MT catch-net
    - cron: "20 9 * * *"     # ~03:20 MT catch-net
    - cron: "20 13 * * *"    # ~07:20 MT catch-net (absorbs multi-hour delays)
  workflow_dispatch: {}

concurrency:
  group: nightly-tt-digest
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests curl_cffi
      - name: grade any remaining paper bets first
        run: |
          python ingest_24live.py --limit 500 || echo "ingest skipped"
          python paper_ledger.py || echo "paper skipped"
      - name: build + push TT digest
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          FORCE_DIGEST: ${{ github.event_name == 'workflow_dispatch' && '--force' || '' }}
        run: python tt_digest.py $FORCE_DIGEST || echo "tt digest skipped"
      - name: commit digest log
        run: |
          git config user.name "tt-bot"
          git config user.email "tt-bot@users.noreply.github.com"
          git add -f tt_digests.md tt.sqlite paper.md 2>/dev/null || true
          git commit -m "nightly tt digest [skip ci]" || { echo "no change"; exit 0; }
          git pull --rebase --autostash || true
          git push
